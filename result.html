<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result Page</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg border-0 text-center p-4" style="width: 400px; border-radius:20px;">

    <div class="mb-3">
        <i class="bi bi-trophy-fill text-warning" style="font-size:50px;"></i>
    </div>

    <h2 class="fw-bold mb-3">Your Result</h2>

    <h1 id="resultText" class="text-primary fw-bold"></h1>

    <h3 id="percentText" class="text-info mb-3"></h3>

    <p id="message" class="fw-semibold fs-5"></p>

    <button onclick="goToLogin()" class="btn btn-primary px-4 mt-2">
        Exit 
    </button>

</div>
    <script src="js/result.js"></script>
  </body>
</html>
