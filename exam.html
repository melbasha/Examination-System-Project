<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
   <div class="exam-header">
    <div class="container d-flex align-items-center justify-content-center">
        <i class="bi bi-journal-code quiz-icon me-2"></i>
        <h2 class="mb-0">JavaScript Quiz</h2>
    </div>
</div>

<div class="container mt-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="quiz-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="question-count" id="count"></div>
                    <div class="timer-wrapper">
                        <i class="bi bi-clock me-1"></i>
                        <span id="timer"></span>
                    </div>
                </div>

                <div class="progress custom-progress mb-4">
                    <div id="timer-progress" class="progress-bar" style="width: 100%"></div>
                </div>

                <div class="quiz-area mb-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <h4 id="question-title" class="fw-bold text-dark"></h4>
                        <button id="markBtn" class="mark-btn" title="Mark for later">
                            <i class="bi bi-bookmark-star"></i>
                        </button>
                    </div>
                </div>

                <div class="answer-area" id="answers">
                    </div>
<div class="mt-4 pt-3 border-top">
    <div class="d-flex justify-content-between mb-2">
        <button id="prevBtn" class="btn btn-primary-custom px-4">Previous</button>
        <button id="nextBtn" class="btn btn-primary-custom px-4">Next</button>
    </div>
    <div class="d-flex justify-content-center">
        <button id="submitBtn" class="btn btn-success-custom px-4">Submit</button>
    </div>
</div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="marked-card p-4">
                <h5 class="fw-bold mb-3 border-bottom pb-2">
                    <i class="bi bi-flag-fill me-2 text-warning"></i>Marked Questions
                </h5>
                <ul id="markedList" class="list-group list-group-flush">
                    </ul>
            </div>
        </div>
    </div>
</div>
    <script src="js/questions.js"></script>
    <script src="js/exam.js"></script>
    </body>
</html>
