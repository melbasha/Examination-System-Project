<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">
        <h1 class="text-center text-primary mb-4">Register</h1>
        <form id="registrationForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInputfirstname" placeholder="Enter First Name">
                <label for="floatingInputfirstname">First Name</label>
                <span id="fnspan"></span>
            </div>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInputlastname" placeholder="Enter Last Name">
                <label for="floatingInputlastname">Last Name</label>
                <span id="lnspan"></span>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInputEmail" placeholder="name@example.com">
                <label for="floatingInputEmail">Email address</label>
                <span id="emailspan"></span>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">Password</label>
                <span id="passspan"></span>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingRePassword" placeholder="Re-Enter Password">
                <label for="floatingRePassword">Re-Enter Password</label>
                <span id="repassspan"></span>
            </div>
            <button type="submit" class="btn btn-primary w-100 pt-3 pb-3">Register</button>
        </form>
        <p class="mt-3 text-center">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Log in</a></p>
    </div>

</body>
    <script src="https://cdn.jsdelivr.net" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
    <script src="js/register.js"></script>
</body>

</html>
