<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">
    <h1 class="text-center text-primary mb-4">Login</h1>
    <form id="loginForm">
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
        <label for="floatingInput">Email address</label>
        <span id="loginspan"></span>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="loginfloatingPassword" placeholder="Password">
        <label for="loginfloatingPassword">Password</label>
        <span id="passloginspan"></span>
      </div>
      <button type="submit" class="btn btn-primary w-100 pt-3 pb-3">Login</button>
    </form>
    <p class="mt-3 text-center">
      Don't have an account? <a href="index.html" class="text-primary text-decoration-none fw-bold">Register now</a>
    </p>
  </div>
    </div>
    <script src="https://cdn.jsdelivr.net"
        integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
        crossorigin="anonymous"></script>
    <script src="js/login.js"></script>
</body>

</html>
